<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jewelry Tech Helpline — Talk to the Agent</title>
<style>
  :root {
    --bg: #0f1220; --panel: #191d33; --accent: #f4c542; --accent2: #6c8cff;
    --user: #2a3350; --agent: #3a2f14; --text: #e8eaf2; --muted: #9aa0b4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #20264a, #0f1220);
    color: #e8eaf2; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
  }
  h1 { font-size: 20px; font-weight: 650; margin: 8px 0 2px; letter-spacing: .2px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
  .mic-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  #mic {
    width: 108px; height: 108px; border-radius: 28px; border: none; cursor: pointer;
    background: linear-gradient(160deg, #34d17a, #16a34a); color: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 40px rgba(34,197,94,.3);
    transition: transform .12s ease, box-shadow .2s ease, background .2s ease;
    position: relative;
  }
  #mic svg { width: 46px; height: 46px; display: block; }
  #mic:hover { transform: translateY(-2px); }
  #mic.live {
    background: linear-gradient(160deg, #ff6b6b, #e0453e);
    box-shadow: 0 0 0 0 rgba(255,107,107,.5); animation: pulse 1.6s infinite;
  }
  #mic:disabled { opacity: .6; cursor: default; animation: none; }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,107,107,.45); }
    70%  { box-shadow: 0 0 0 24px rgba(255,107,107,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,107,107,0); }
  }
  #status { font-size: 14px; color: var(--muted); min-height: 20px; }
  #status.speaking { color: var(--accent); }
  #status.listening { color: #7ee0a1; }
</style>
</head>
<body>
  <h1>💎 Jewelry Tech Helpline</h1>
  <div class="sub">Talk to the AI assistant using your microphone</div>

  <div class="mic-wrap">
    <button id="mic" aria-label="Start call"></button>
    <div id="status">Click the mic and allow microphone access</div>
  </div>

<script>
"use strict";

// ── G.711 μ-law codec (matches the server's 8 kHz mu-law pipeline) ──────────
function linearToMulaw(sample) {          // int16 → μ-law byte
  const BIAS = 0x84, CLIP = 32635;
  let sign = (sample >> 8) & 0x80;
  if (sign) sample = -sample;
  if (sample > CLIP) sample = CLIP;
  sample += BIAS;
  let exponent = 7;
  for (let mask = 0x4000; (sample & mask) === 0 && exponent > 0; exponent--, mask >>= 1) {}
  const mantissa = (sample >> (exponent + 3)) & 0x0F;
  return (~(sign | (exponent << 4) | mantissa)) & 0xFF;
}
function mulawToLinear(u) {                // μ-law byte → int16
  u = ~u & 0xFF;
  const sign = u & 0x80, exponent = (u >> 4) & 0x07, mantissa = u & 0x0F;
  let sample = ((mantissa << 3) + 0x84) << exponent;
  sample -= 0x84;
  return sign ? -sample : sample;
}

// ── State ───────────────────────────────────────────────────────────────────
const micBtn = document.getElementById("mic");
const statusEl = document.getElementById("status");

let ws = null, audioCtx = null, micStream = null;
let processor = null, sourceNode = null, silentGain = null;
let running = false;

// Call-button icons: green phone (idle → connect) / red hang-up (live → end).
const ICON_CALL =
  '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">' +
  '<path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 ' +
  '1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 ' +
  '0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>';
const ICON_END =
  '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">' +
  '<path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 ' +
  '1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 ' +
  '0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 ' +
  '0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>';

// Ringback ("calling…") tone: plays from the click until the agent's first
// audio arrives (the "pickup"), like a phone ringing while it connects.
let ringOscs = null, ringGain = null, ringTimer = null, ringing = false;

// The agent is pre-warmed, so its first audio can arrive almost instantly —
// which made the greeting cut in "suddenly" before it felt like a real call.
// Enforce a minimum ring time: buffer early agent audio and only "pick up"
// after the phone has rung for at least MIN_RING_MS.
const MIN_RING_MS = 1200;
let ringStartMs = 0;
let pickupBuffer = [];   // agent audio held until the ring reaches MIN_RING_MS
let pickupTimer = null;

// Playback scheduling (gapless μ-law @ 8 kHz)
let nextPlayTime = 0;
const activeSources = new Set();

// Resampler carry state (input rate → 8000)
let inBuf = new Float32Array(0);
let readPos = 0;

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls || "";
}

// ── Ringback tone (440+480 Hz, 3.5 s on / 2.5 s off cadence) ─────────────────
function startRingback() {
  if (!audioCtx || ringing) return;
  ringing = true;
  ringStartMs = performance.now();
  ringGain = audioCtx.createGain();
  ringGain.gain.value = 0.0001;
  ringGain.connect(audioCtx.destination);
  ringOscs = [440, 480].map((f) => {
    const o = audioCtx.createOscillator();
    o.type = "sine";
    o.frequency.value = f;
    o.connect(ringGain);
    o.start();
    return o;
  });
  // Gate the gain on/off so it rings for 3.5 s then rests for 2.5 s, repeating.
  const ring = () => {
    if (!ringing || !audioCtx) return;
    const t = audioCtx.currentTime;
    ringGain.gain.cancelScheduledValues(t);
    ringGain.gain.setValueAtTime(0.0001, t);
    ringGain.gain.exponentialRampToValueAtTime(0.12, t + 0.04);   // ring on
    ringGain.gain.setValueAtTime(0.12, t + 3.5);
    ringGain.gain.exponentialRampToValueAtTime(0.0001, t + 3.54); // ring off
    ringTimer = setTimeout(ring, 6000);
  };
  ring();
  setStatus("📞 Calling the agent…");
}

function stopRingback() {
  if (!ringing) return;
  ringing = false;
  if (ringTimer) { clearTimeout(ringTimer); ringTimer = null; }
  if (pickupTimer) { clearTimeout(pickupTimer); pickupTimer = null; }
  try {
    const t = audioCtx ? audioCtx.currentTime : 0;
    if (ringGain) { ringGain.gain.cancelScheduledValues(t); ringGain.gain.setValueAtTime(0.0001, t); }
  } catch (e) {}
  try { if (ringOscs) ringOscs.forEach((o) => { try { o.stop(); } catch (e) {} }); } catch (e) {}
  ringOscs = null; ringGain = null;
}

// Once the ring has played long enough, silence it and flush any agent audio
// that arrived early so the greeting resumes seamlessly from the "pickup".
function flushPickup() {
  pickupTimer = null;
  stopRingback();                // clears pickupTimer too (already null here)
  const chunks = pickupBuffer;
  pickupBuffer = [];
  for (const b of chunks) playMulaw(b);
}

// ── Playback ────────────────────────────────────────────────────────────────
function playMulaw(bytes) {
  if (ringing) {
    const remaining = MIN_RING_MS - (performance.now() - ringStartMs);
    if (remaining > 0) {
      // Agent answered early — keep ringing and hold this audio until pickup.
      pickupBuffer.push(bytes);
      if (!pickupTimer) pickupTimer = setTimeout(flushPickup, remaining);
      return;
    }
    stopRingback();              // rang long enough — "pick up" now
  }
  const n = bytes.length;
  const f32 = new Float32Array(n);
  for (let i = 0; i < n; i++) f32[i] = mulawToLinear(bytes[i]) / 32768;
  const buf = audioCtx.createBuffer(1, n, 8000);
  buf.copyToChannel(f32, 0);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  if (nextPlayTime < now) nextPlayTime = now + 0.04;
  src.start(nextPlayTime);
  nextPlayTime += buf.duration;
  activeSources.add(src);
  src.onended = () => activeSources.delete(src);
  setStatus("🔊 Agent speaking…", "speaking");
}

function clearPlayback() {                 // barge-in: stop everything queued
  for (const s of activeSources) { try { s.stop(); } catch (e) {} }
  activeSources.clear();
  nextPlayTime = 0;
}

// ── Capture: downsample to 8 kHz + μ-law encode ─────────────────────────────
function resampleTo8k(input, inRate) {
  const merged = new Float32Array(inBuf.length + input.length);
  merged.set(inBuf, 0);
  merged.set(input, inBuf.length);
  inBuf = merged;
  const ratio = inRate / 8000;
  const out = [];
  while (readPos + 1 < inBuf.length) {
    const i = Math.floor(readPos);
    const frac = readPos - i;
    out.push(inBuf[i] * (1 - frac) + inBuf[i + 1] * frac);
    readPos += ratio;
  }
  const keep = Math.floor(readPos);
  inBuf = inBuf.slice(keep);
  readPos -= keep;
  return out;
}

function onAudio(e) {
  if (!running || !ws || ws.readyState !== WebSocket.OPEN) return;
  const input = e.inputBuffer.getChannelData(0);
  const down = resampleTo8k(input, audioCtx.sampleRate);
  if (!down.length) return;
  const mu = new Uint8Array(down.length);
  for (let i = 0; i < down.length; i++) {
    let s = Math.max(-1, Math.min(1, down[i]));
    mu[i] = linearToMulaw(Math.round(s * 32767));
  }
  ws.send(mu.buffer);
}

// ── Session lifecycle ───────────────────────────────────────────────────────
// The WebSocket lives at /ws on THIS page's own origin, so the page MUST be
// served by web_app.py (http://localhost:5000). If it is opened as a raw file
// (file://) or through an editor "live preview" on another port (e.g. VS Code
// Live Server on :5500), the HTML still loads but there is no /ws there and the
// socket fails. wsEndpoint() returns null in those cases so we can explain it.
function wsEndpoint() {
  if (location.protocol === "file:" || !location.host) return null;
  const proto = location.protocol === "https:" ? "wss" : "ws";
  return proto + "://" + location.host + "/ws";
}

async function start() {
  const wsUrl = wsEndpoint();
  if (!wsUrl) {
    setStatus("Open http://localhost:5000 (run: python web_app.py) — not the .html file itself.");
    return;
  }

  micBtn.disabled = true;

  // Create the audio context on the click gesture and start the "calling" ring
  // immediately — before we even ask for the mic — so there is instant feedback.
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") await audioCtx.resume();
  inBuf = new Float32Array(0); readPos = 0; nextPlayTime = 0;
  pickupBuffer = [];
  startRingback();

  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, channelCount: 1 },
    });
  } catch (err) {
    teardown();
    setStatus("Microphone blocked. Allow the mic (lock icon in the address bar), then click again.");
    return;
  }

  let opened = false;
  ws = new WebSocket(wsUrl);
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    opened = true;
    running = true;
    // Build the capture graph: mic → script processor (routed to a muted gain
    // node so onaudioprocess fires without playing the mic back to the speaker).
    sourceNode = audioCtx.createMediaStreamSource(micStream);
    processor = audioCtx.createScriptProcessor(4096, 1, 1);
    silentGain = audioCtx.createGain();
    silentGain.gain.value = 0;
    processor.onaudioprocess = onAudio;
    sourceNode.connect(processor);
    processor.connect(silentGain);
    silentGain.connect(audioCtx.destination);

    micBtn.disabled = false;
    micBtn.classList.add("live");
    micBtn.innerHTML = ICON_END;
    micBtn.setAttribute("aria-label", "End call");
    // Keep showing "Calling…" until the agent actually picks up (first audio);
    // stopRingback() then flips the status when the greeting starts.
    if (!ringing) setStatus("🎤 Listening…", "listening");
  };

  ws.onmessage = (ev) => {
    if (typeof ev.data === "string") {
      let m; try { m = JSON.parse(ev.data); } catch (e) { return; }
      if (m.type === "clear") { clearPlayback(); setStatus("🎤 Listening…", "listening"); }
      else if (m.type === "hangup") { setStatus("Call ended."); stop(); }
    } else {
      playMulaw(new Uint8Array(ev.data));
    }
  };

  ws.onerror = () => {
    if (!opened) setStatus("Can't reach the agent at " + wsUrl + " — is web_app.py running on this port?");
  };
  ws.onclose = (ev) => {
    if (!opened) {
      // The socket never opened: wrong port/origin or the backend isn't running.
      teardown();
      setStatus("Connection failed to " + wsUrl +
        (ev && ev.code ? " (code " + ev.code + ")" : "") +
        ". Run 'python web_app.py' and open http://localhost:5000.");
      return;
    }
    if (running) stop();
  };
}

// Release audio/mic/socket resources WITHOUT touching the status line, so a
// diagnostic message set by the caller survives.
function teardown() {
  running = false;
  stopRingback();
  clearPlayback();
  try { processor && (processor.onaudioprocess = null); } catch (e) {}
  try { sourceNode && sourceNode.disconnect(); } catch (e) {}
  try { processor && processor.disconnect(); } catch (e) {}
  try { silentGain && silentGain.disconnect(); } catch (e) {}
  try { micStream && micStream.getTracks().forEach((t) => t.stop()); } catch (e) {}
  try { audioCtx && audioCtx.close(); } catch (e) {}
  ws = null; audioCtx = null; micStream = null; processor = null; sourceNode = null;
  micBtn.classList.remove("live");
  micBtn.innerHTML = ICON_CALL;
  micBtn.setAttribute("aria-label", "Start call");
  micBtn.disabled = false;
}

function stop() {
  try { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "stop" })); } catch (e) {}
  try { ws && ws.close(); } catch (e) {}
  teardown();
  setStatus("Stopped. Click the mic to talk again.");
}

micBtn.innerHTML = ICON_CALL;   // start in the green "call" state
micBtn.addEventListener("click", () => { running ? stop() : start(); });
</script>
</body>
</html>
